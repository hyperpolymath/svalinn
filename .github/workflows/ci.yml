# SPDX-License-Identifier: MPL-2.0
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-
      - name: Run linter
        run: deno lint
        working-directory: src
  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Check formatting
        run: deno fmt --check
        working-directory: src
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-
      - name: Run type checking
        # src/main.ts and compose/cli.ts were never created; since the
        # .res→.affine migration, src/ holds AffineScript, not a Deno TS app.
        # Type-check the real TS entrypoint: the MVP gateway.
        run: deno check tools/mvp/svalinn_gateway.ts
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-
      - name: Run tests
        run: deno test --allow-net --allow-read --allow-env
        working-directory: src
  extended-tests:
    name: Extended Tests (E2E / Property / Schema)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-ext-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-ext-
      - name: Run E2E tests
        run: deno test --allow-net --allow-read --allow-env tests/e2e/
      - name: Run property tests
        run: deno test --allow-net --allow-read --allow-env tests/property/
      - name: Run schema tests
        run: deno test --allow-net --allow-read --allow-env tests/schema/
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, format, typecheck, test, extended-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-
      - name: Build svalinn binary
        # Single source of truth: the `build` task in src/deno.json. Since the
        # .res->.affine migration, src/ holds AffineScript and the only
        # Deno-compilable entrypoint is the MVP gateway
        # (tools/mvp/svalinn_gateway.ts) — the same file the typecheck job checks.
        # The old src/main.ts and src/compose/cli.ts were never created, and there
        # is no svalinn-compose CLI to build. The task bakes the gateway's runtime
        # permissions (net/read/write/env/run). When the AffineScript/Ephapax app
        # gains a compilable entrypoint, update the build task in src/deno.json and
        # both this job and local `deno task build` follow automatically.
        run: deno task build
        working-directory: src
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: svalinn-binaries-linux
          path: src/dist/
          retention-days: 7
