# OpenLiteSpeed configuration for Svalinn Edge Gateway
# Provides HTTP/3 (QUIC) termination and reverse proxy to Deno backend

serverName                svalinn-ols
user                      nobody
group                     nogroup
priority                  0
autoRestart               1
chrootPath                /
enableChroot              0
inMemBufSize              60M
swappingDir               /tmp/lshttpd/swap
autoFix503                1
gracefulRestartTimeout    300
mime                      conf/mime.properties
showVersionNumber         0
adminEmails               j.d.a.jewell@open.ac.uk

errorlog logs/error.log {
  logLevel                WARN
  debugLevel              0
  rollingSize             10M
  enableStderrLog         1
}

accesslog logs/access.log {
  rollingSize             10M
  keepDays                30
  compressArchive         0
}

# Tune for edge gateway workload
maxConnections            10000
maxSSLConnections         10000
connTimeout               300
maxKeepAliveReq           10000
keepAliveTimeout          5
sndBufSize                0
rcvBufSize                0
maxReqURLLen              32768
maxReqHeaderSize          65536
maxReqBodySize            2047M
maxDynRespHeaderSize      32768
maxDynRespSize            2047M

# HTTP/3 (QUIC) settings
quicEnable                1
quicShmDir                /dev/shm

# Security: Hide OLS version, disable directory listings
useIpInProxyHeader        2
bubbleWrap                0

module cache {
  # Disable static cache — svalinn is an API gateway
  enabled                 0
}
